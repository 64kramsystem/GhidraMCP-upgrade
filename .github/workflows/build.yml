name: Build with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

# Cancel in progress workflows runs for the same ref (PR/branch).
#
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GHIDRA_LIBS: >-
        Features/Base/lib/Base.jar
        Features/Decompiler/lib/Decompiler.jar
        Framework/Docking/lib/Docking.jar
        Framework/Generic/lib/Generic.jar
        Framework/Project/lib/Project.jar
        Framework/SoftwareModeling/lib/SoftwareModeling.jar
        Framework/Utility/lib/Utility.jar
        Framework/Gui/lib/Gui.jar

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 2
    - name: Set up JDK 21
      uses: actions/setup-java@v5
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Find latest Ghidra 12.0.x release
      run: |
        GHIDRA_URL=$(gh api repos/NationalSecurityAgency/ghidra/releases \
          --jq '[.[] | select(.tag_name | startswith("Ghidra_12.0"))][0].assets[0].browser_download_url')
        echo "GHIDRA_URL=$GHIDRA_URL" >> "$GITHUB_ENV"
        # Extract dir name: ghidra_12.0.4_PUBLIC (strip date suffix and .zip)
        GHIDRA_DIR=$(basename "$GHIDRA_URL" .zip | sed 's/_[0-9]*$//')
        echo "GHIDRA_DIR=$GHIDRA_DIR" >> "$GITHUB_ENV"
        # Extract version: ghidra_12.0.4_PUBLIC -> 12.0.4
        GHIDRA_VERSION=$(echo "$GHIDRA_DIR" | sed 's/ghidra_\(.*\)_PUBLIC/\1/')
        echo "GHIDRA_VERSION=$GHIDRA_VERSION" >> "$GITHUB_ENV"
        echo "Resolved Ghidra release: $GHIDRA_DIR (version $GHIDRA_VERSION)"
      env:
        GH_TOKEN: ${{ github.token }}

    - name: Download Ghidra
      run: |
        wget --no-verbose -O ghidra.zip "$GHIDRA_URL"
        7z x -bd ghidra.zip

    - name: Copy Ghidra libs
      run: |
        mkdir -p ./lib
        for libfile in ${{ env.GHIDRA_LIBS }}
          do echo "Copying ${libfile} to lib/"
          cp "$GHIDRA_DIR"/Ghidra/${libfile} ./lib/
        done

    - name: Build with Maven
      run: mvn clean package assembly:single -Dghidra.version="$GHIDRA_VERSION"

    - name: Run integration tests
      run: |
        # Import test binary into a headless Ghidra project
        mkdir -p /tmp/test_project
        "$GHIDRA_DIR"/support/analyzeHeadless \
          /tmp/test_project test_mcp \
          -import test/fixtures/test_6502.bin \
          -processor "6502:LE:16:default" \
          -scriptPath "$(pwd)/test" \
          -postScript HeadlessMCPServer.java &
        SERVER_PID=$!

        # Wait for server to come up
        for i in $(seq 1 60); do
          if curl -sf http://localhost:8080/segments >/dev/null 2>&1; then
            echo "Server is up after ${i}s"
            break
          fi
          if [ "$i" -eq 60 ]; then
            echo "Timed out waiting for headless server"
            kill $SERVER_PID 2>/dev/null || true
            exit 1
          fi
          sleep 1
        done

        # Run tests
        bash test_endpoints.sh || TEST_EXIT=$?

        # Shutdown headless server
        curl -sf http://localhost:8080/shutdown >/dev/null 2>&1 || true
        wait $SERVER_PID 2>/dev/null || true

        exit ${TEST_EXIT:-0}

    - name: Assemble release directory
      run: |
        mkdir release
        cp target/GhidraMCP-*-SNAPSHOT.zip release/
        cp bridge_mcp_ghidra.py release/

    - name: Upload artifact
      uses: actions/upload-artifact@v7
      with:
        name: GhidraMCP-artifact
        path: |
          release/*

    - name: Check if release-worthy files changed
      id: changes
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: |
        CHANGED=$(git diff --name-only HEAD~1 HEAD -- src/ pom.xml bridge_mcp_ghidra.py)
        if [ -n "$CHANGED" ]; then
          echo "release=true" >> "$GITHUB_OUTPUT"
        fi

    - name: Create release
      if: steps.changes.outputs.release == 'true' || github.event_name == 'workflow_dispatch'
      run: |
        TAG="v${GHIDRA_VERSION}-$(date -u +%Y%m%d%H%M%S)"
        gh release create "$TAG" release/* \
          --title "GhidraMCP for Ghidra $GHIDRA_VERSION" \
          --notes "Built against Ghidra $GHIDRA_VERSION"
      env:
        GH_TOKEN: ${{ github.token }}
